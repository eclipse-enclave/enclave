schemaVersion: "1"
kind: mixin
name: devtools
displayName: Development Tools
description: Core development tools (vim, htop, ripgrep, etc.)
priority: 40
failOnInstallError: true
aptPackages:
  - vim
  - nano
  - htop
  - tree
  - golang-go
  - shellcheck
  - yq
  - ripgrep
  - fd-find
  - netcat-openbsd
  - socat
  - dnsutils
  - iputils-ping
  - xxd
