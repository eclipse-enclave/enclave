# Enclave DNS Allowlist Configuration - OpenCode
no-resolv
no-poll
address=/#/

# OpenCode
server=/opencode.ai/8.8.8.8
server=/models.dev/8.8.8.8

# OpenAI
conf-file=/etc/dnsmasq.allowlists/fragments/openai.conf

# Anthropic
conf-file=/etc/dnsmasq.allowlists/fragments/anthropic.conf

# Google/Gemini
conf-file=/etc/dnsmasq.allowlists/fragments/google.conf

# Common Infrastructure
conf-file=/etc/dnsmasq.allowlists/fragments/github.conf
conf-file=/etc/dnsmasq.allowlists/fragments/npm.conf
conf-file=/etc/dnsmasq.allowlists/fragments/pypi.conf
conf-file=/etc/dnsmasq.allowlists/fragments/go.conf
conf-file=/etc/dnsmasq.allowlists/fragments/rust.conf
conf-file=/etc/dnsmasq.allowlists/fragments/cdn.conf
conf-file=/etc/dnsmasq.allowlists/fragments/tls.conf
