schemaVersion: "1"
kind: sandbox
name: theia
displayName: Theia IDE
description: Theia desktop IDE attached to an enclave container

sandbox:
  entrypoint: { run: [sleep, infinity] }
  configDir: .theia

postStart:
  openIDE: theia

credentials:
  sources:
    anthropic-api-key: { env: [ANTHROPIC_API_KEY] }

network:
  serviceDomains:
    api.anthropic.com: anthropic-api-key
    "*.anthropic.com": anthropic-api-key
  serviceAuth:
    anthropic-api-key: { headerName: x-api-key }

providers:
  - name: anthropic
    credentials: [anthropic-api-key]
