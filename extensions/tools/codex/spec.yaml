schemaVersion: "1"
kind: sandbox
name: codex
displayName: OpenAI Codex CLI
description: OpenAI Codex CLI

sandbox:
  entrypoint: { run: [codex] }
  configDir: .codex
  qemuMinMemoryMiB: 4096
  qemuStoreCacheMmap: true
  skillsDir: .codex/skills
  settingsFile: codex-config.toml
  settingsTarget: .codex/config.toml
  yoloFlag: --dangerously-bypass-approvals-and-sandbox
  yoloEnabled: true
  continueArgs: [resume, --last]
  resumeArgs: [resume]
  passthroughPaths: [config.toml, skills/]

credentials:
  sources:
    openai-api-key: { env: [OPENAI_API_KEY] }

network:
  serviceDomains:
    api.openai.com: openai-api-key
    "*.openai.com": openai-api-key
  serviceAuth:
    openai-api-key: { headerName: authorization, valueFormat: "Bearer %s" }

providers:
  - name: openai-codex
    credentials: [openai-api-key]
    authFiles: [auth.json]
    oauthPorts: [{ port: "1455" }]
    authSession:
      mode: any
      checks: [{ file: auth.json, type: file_exists }]
