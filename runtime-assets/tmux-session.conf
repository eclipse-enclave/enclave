# tmux configuration for the managed agent session (session monitor).
#
# The entrypoint wraps the agent command in `tmux new-session` on a dedicated
# socket (-L enclave) with this config so `enclave status` can capture the
# rendered screen and OSC title via capture-pane / #{pane_title}. Loaded with
# -f, so the user's ~/.tmux.conf does not apply here. Keep this minimal: the
# session should look and feel like a plain terminal.

# No visible tmux chrome.
set -g status off

# The session exists only to host the agent; leave when it exits.
set -g exit-empty on

# Mouse on so wheel scrollback keeps working for attached users.
set -g mouse on
set -g history-limit 10000

# Match the plain-TTY terminal capabilities the agents expect.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -s escape-time 0

# Track the agent's OSC 0/2 title in #{pane_title} and propagate it to the
# outer terminal so attached users keep window titles.
set -g set-titles on
set -g set-titles-string "#{pane_title}"

# Let agent escape sequences (OSC 52 clipboard, passthrough) through.
set -g set-clipboard on
set -g allow-passthrough on
