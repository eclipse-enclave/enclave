schemaVersion: "1"
kind: sandbox
name: gemini
displayName: Google Gemini CLI
description: Google Gemini CLI

sandbox:
  entrypoint: { run: [gemini] }
  configDir: .gemini
  skillsDir: .gemini/skills
  memoryFiles: [.gemini/GEMINI.md]
  settingsFile: gemini-settings.json
  settingsTarget: .gemini/settings.json
  yoloFlag: --approval-mode=yolo
  yoloEnabled: true
  continueArgs: [--resume, latest]
  passthroughPaths: [settings.json, skills/]

credentials:
  sources:
    gemini-api-key: { env: [GEMINI_API_KEY] }

network:
  serviceDomains:
    generativelanguage.googleapis.com: gemini-api-key
  serviceAuth:
    gemini-api-key: { headerName: x-goog-api-key }

providers:
  - name: gemini
    credentials: [gemini-api-key]
    authFiles: [credentials.json]
    authSession:
      mode: any
      checks: [{ file: credentials.json, type: file_exists }]
