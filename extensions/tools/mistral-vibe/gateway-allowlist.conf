# Enclave DNS Allowlist Configuration - Mistral Vibe
no-resolv
no-poll
address=/#/

# Mistral
conf-file=/etc/dnsmasq.allowlists/fragments/mistral.conf

# Common Infrastructure
conf-file=/etc/dnsmasq.allowlists/fragments/github.conf
conf-file=/etc/dnsmasq.allowlists/fragments/npm.conf
conf-file=/etc/dnsmasq.allowlists/fragments/pypi.conf
conf-file=/etc/dnsmasq.allowlists/fragments/go.conf
conf-file=/etc/dnsmasq.allowlists/fragments/cdn.conf
conf-file=/etc/dnsmasq.allowlists/fragments/tls.conf
