name: Debian Package Smoke Test

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: deb-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-deb:
    uses: ./.github/workflows/reusable-deb-build.yml
    with:
      runner: ubuntu-24.04
      artifact_name: deb
      artifact_retention_days: 7
