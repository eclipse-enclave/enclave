schemaVersion: "1"
kind: sandbox
name: mistral-vibe
displayName: Mistral Vibe
description: Mistral Vibe CLI coding assistant
defaultIncluded: false

sandbox:
  entrypoint: { run: [vibe] }
  configDir: .vibe
  skillsDir: .vibe/skills
  settingsFile: mistral-vibe-config.toml
  settingsTarget: .vibe/config.toml
  yoloFlag: "--agent auto-approve"
  yoloEnabled: true
  continueArgs: [--continue]
  passthroughPaths: [config.toml, agents/, prompts/, skills/]

providers:
  - name: mistral
