# Enclave DNS Allowlist Configuration for Theia
# dnsmasq will only resolve domains listed here

# Don't use upstream resolv.conf
no-resolv
no-poll

# Block all domains by default (return NXDOMAIN)
address=/#/

# === ALLOWLISTED DOMAINS ===

# Anthropic / Claude
conf-file=/etc/dnsmasq.allowlists/fragments/anthropic.conf

# GitHub
conf-file=/etc/dnsmasq.allowlists/fragments/github.conf

# npm (Node.js)
conf-file=/etc/dnsmasq.allowlists/fragments/npm.conf

# SSL/TLS certificate validation
conf-file=/etc/dnsmasq.allowlists/fragments/tls.conf
